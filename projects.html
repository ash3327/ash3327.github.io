<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="description" content="Personal Website of Sam">
    <title>Projects</title>
    <style>
      @import "styles/base_style.css";
      @import "styles/style.css";
      @import "styles/timeline.css";
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src="scripts/data_box.js"></script>
    <script>
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString.substring(1));
      var arg = urlParams.get('filter');
      if (arg === undefined) {
        arg = null;
      }
      var mode = urlParams.get('mode');
    </script>
  </head>
  <body>
    <div class="contents">
      <div class="panel">
        <div class="panel-child panel-child-mov outlined-box" style="background-color: aquamarine; height: var(--panel-height);">
          <h2 id="projects_title" class="light-title"></h2>
          <p id="projects_desc"></p>
          <script>box_load(_desc_box_path, 'projects', 'projects_title', 'projects_desc');</script>
        </div>
      </div>
      <div class="panel-child-mov">
      <h2 class="timeline-header">Projects</h2></div>
      <ul id="project_timeline" class="timeline">
        <script>timeline_load(_project_path, "project_timeline", arg, mode)</script>
        <li></li>
      </ul>

        <button id="toggle_button" class="circ-button"
       onclick="urlParams.has('mode') ? urlParams.delete('mode') : urlParams.append('mode', 'list'); parent.location.href='./index.html?'+urlParams.toString()+'#projects'">
          <script>
            document.getElementById("toggle_button").innerHTML = 'Switch To ' + (urlParams.has('mode') ? 'Timeline Mode' : 'List Mode');
          </script>
        </button>
      </div> -->
      <div class="panel">
        <div class="panel-child panel-child-mov" style="background-color: pink; height: 200px;"></div>
        <div class="panel-child">
          <div class="panel-child-mov">
            <h2 id="news_title" class="light-title"></h2>
            <p id="news_desc"></p>
            <script>box_load(_desc_box_path, 'news', 'news_title', 'news_desc');</script>
          </div>
          <button class="circ-button" style="float: right;" onclick="parent.location.href='./index.html#news'">Learn More <i class="fa fa-angle-double-right" style="font-size: medium;"></i></button>
        </div>
      </div>
    </div>
  </body>
</html>
