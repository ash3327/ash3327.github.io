<!DOCTYPE html>
<html>
  <head>
    <style>
      @import "styles/base_style.css";
      @import "styles/header_style.css";
    </style>
    <script>
      function setTabSelected(page) {
        if (page == 'undefined' || page == 'home') 
          return;
        var element = document.getElementById(page);
        element.className = 'active';
      }

      // general handler
      var params = location.href.split('?')[1];
      if (params !== undefined) {
        params = params.split('&');
        data = {};
        for (x in params)
        {
          data[params[x].split('=')[0]] = params[x].split('=')[1];
        }
        
        // handles the page
        var page = data['page'];
        window.onload = function() {
          setTabSelected(page);
        }
      }
    </script>
  </head>
  <body>
    <ul class="nav-bar">
      <li style="padding-left: 5%;"><a href="./index.html#home" target="_top" style="font-family: Copperplate, Papyrus, fantasy; width: fit-content; font-weight: bold; font-size: larger;">Sam's Writings</a></li>
      <li style="float:right; padding-right: 5%"><a id="news" href="./index.html#news" target="_top">News</a></li>
      <li style="float:right;"><a id="projects" href="./index.html#projects" target="_top">Projects</a></li>
      <li style="float:right;"><a id="aboutme", href="./index.html#aboutme" target="_top">About Me</a></li>
    </ul>
  </body>
</html>
