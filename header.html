<!DOCTYPE html>
<html>
  <head>
    <style>
      @import "styles/header_style.css";
    </style>
    <script>
      // general handler
      var params = location.href.split('?')[1].split('&');
      data = {};
      for (x in params)
      {
        data[params[x].split('=')[0]] = params[x].split('=')[1];
      }
      
      // handles the page
      var page = data['page'];
      window.onload = function() {
        var element = document.getElementById(page);
        element.className = 'active';
      }
    </script>
  </head>
  <body>
    <!-- <h1 style="padding-left: 20px; font-family: Copperplate, Papyrus, fantasy; height: 39px;">Sam's Personal Website</h1> -->
    <ul class="nav-bar">
      <li style="padding-left: 5%;"><a href="./" target="_top" style="font-family: Copperplate, Papyrus, fantasy; width: fit-content; font-weight: bold;">Sam's Writings</a></li>
      <li style="float:right; padding-right: 5%"><a id="news" href="./news" target="_top">News</a></li>
      <li style="float:right;"><a id="home", href="./" target="_top">Home</a></li>
    </ul>
  </body>
</html>
